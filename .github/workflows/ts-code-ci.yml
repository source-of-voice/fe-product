name: ts-code-ci.yml
on:
  push:
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'vite.config.ts'
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'vite.config.ts'
jobs:
  Quality:
    name: Lint, format, typecheck, test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check
        continue-on-error: true  #we want only warning

      - name: Run linter
        run: npm run lint
        continue-on-error: true #we want only warning

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:ci

      - name: Build app
        run: npm run build





